name: Veille upstream BMAD-METHOD

on:
  schedule:
    # 1er du mois à 07:00 UTC
    - cron: '0 7 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/bmad-code-org/BMAD-METHOD.git
          git fetch upstream main --quiet

      - name: Generate upstream sync report
        id: report
        run: |
          node tools/upstream-sync-report.mjs > /tmp/report-output.txt
          cat /tmp/report-output.txt
          if grep -q "NOTHING_NEW=true" /tmp/report-output.txt; then
            echo "nothing_new=true" >> $GITHUB_OUTPUT
          else
            echo "nothing_new=false" >> $GITHUB_OUTPUT
            new_modules=$(grep '^NEW_MODULES=' /tmp/report-output.txt | cut -d= -f2)
            new_files=$(grep '^NEW_FILES=' /tmp/report-output.txt | cut -d= -f2)
            echo "new_modules=$new_modules" >> $GITHUB_OUTPUT
            echo "new_files=$new_files" >> $GITHUB_OUTPUT
          fi

      - name: Ensure labels exist
        if: steps.report.outputs.nothing_new == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create upstream-sync --color BFD4F2 --description "Tracks new upstream content to translate" --force
          gh label create translation --color 0E8A16 --description "Related to BMAD-FR translation work" --force

      - name: Create tracking issue
        if: steps.report.outputs.nothing_new == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Veille upstream du $DATE — ${{ steps.report.outputs.new_modules }} module(s), ${{ steps.report.outputs.new_files }} fichier(s)"
          gh issue create \
            --title "$TITLE" \
            --body-file upstream-sync-report.md \
            --label "upstream-sync,translation"

      - name: Report (no new content)
        if: steps.report.outputs.nothing_new == 'true'
        run: echo "No new upstream content to track. Skipping issue creation."
