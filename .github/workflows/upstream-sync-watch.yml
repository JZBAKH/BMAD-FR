name: Veille upstream BMAD-METHOD (archive mensuelle)

# Génère le 1er de chaque mois (07h UTC) un snapshot des changements upstream
# et l'ajoute en tête du fichier HISTORIQUE-UPSTREAM-fr.md à la racine du repo.
#
# Différence avec upstream-changes-report.yml (biquotidien) :
#   - Le biquotidien écrase son rapport à chaque exécution → vue de l'instant courant.
#   - Celui-ci accumule des snapshots mensuels → archive historique consultable.
#
# Pas d'issue créée, pas de notification email. Tout reste dans le fichier
# HISTORIQUE-UPSTREAM-fr.md visible directement dans le repo.

on:
  schedule:
    # 1er du mois à 07:00 UTC
    - cron: '0 7 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bmad-fr
        uses: actions/checkout@v4
        with:
          ref: bmad-fr
          fetch-depth: 0
          token: ${{ secrets.PAT_WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/bmad-code-org/BMAD-METHOD.git 2>/dev/null || true
          git fetch upstream main --quiet

      - name: Generate monthly upstream report
        run: node tools/upstream-sync-report.mjs

      - name: Append report to HISTORIQUE-UPSTREAM-fr.md
        run: node tools/append-upstream-history.mjs

      - name: Commit and push if history changed
        run: |
          git config user.name "bmad-fr-sync[bot]"
          git config user.email "bmad-fr-sync[bot]@users.noreply.github.com"
          if git diff --quiet HISTORIQUE-UPSTREAM-fr.md 2>/dev/null; then
            echo "✅ Aucune nouveauté upstream ce mois — rien à archiver"
            exit 0
          fi
          git add HISTORIQUE-UPSTREAM-fr.md
          DATE=$(date -u +%Y-%m-%d)
          {
            echo "chore(history): snapshot upstream mensuel ($DATE)"
            echo
            echo "Snapshot des changements upstream au $DATE, ajouté en tête de"
            echo "HISTORIQUE-UPSTREAM-fr.md. Généré automatiquement par"
            echo ".github/workflows/upstream-sync-watch.yml."
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push origin bmad-fr

      - name: Render summary on run page
        if: always()
        run: |
          if [ -f HISTORIQUE-UPSTREAM-fr.md ]; then
            echo "## Aperçu de l'historique mis à jour" >> $GITHUB_STEP_SUMMARY
            echo '```markdown' >> $GITHUB_STEP_SUMMARY
            head -60 HISTORIQUE-UPSTREAM-fr.md >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[Voir le fichier complet sur GitHub](https://github.com/$GITHUB_REPOSITORY/blob/bmad-fr/HISTORIQUE-UPSTREAM-fr.md)" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Aucun historique généré (pas de nouveauté upstream ce mois)." >> $GITHUB_STEP_SUMMARY
          fi
