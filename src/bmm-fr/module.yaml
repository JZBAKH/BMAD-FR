code: bmm
name: "BMad Method Agile-AI Driven-Development"
description: "Framework de développement agile piloté par l'IA"
default_selected: true # This module will be selected by default for new installations

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

project_name:
  prompt: "Comment s'appelle votre projet ?"
  default: "{directory_name}"
  result: "{value}"

user_skill_level:
  prompt:
    - "Quel est votre niveau d'expérience en développement ?"
    - "Cela affecte la façon dont les agents expliquent les concepts dans le chat."
  default: "intermediate"
  result: "{value}"
  single-select:
    - value: "beginner"
      label: "Débutant - Expliquer les choses clairement"
    - value: "intermediate"
      label: "Intermédiaire - Équilibrer les détails et la rapidité"
    - value: "expert"
      label: "Expert - Être direct et technique"

planning_artifacts: # Phase 1-3 artifacts
  prompt: "Où doivent être stockés les artefacts de planification ? (Brainstormings, Briefs, Cahiers des charges/PRD, UX Designs, Architecture, Thèmes/Epics)"
  default: "{output_folder}/planning-artifacts"
  result: "{project-root}/{value}"

implementation_artifacts: # Phase 4 artifacts and quick-dev flow output
  prompt: "Où doivent être stockés les artefacts d'implémentation ? (Statut du sprint, cas d'usage, revues, rétrospectives, sortie Quick Flow)"
  default: "{output_folder}/implementation-artifacts"
  result: "{project-root}/{value}"

project_knowledge: # Artifacts from research, document-project output, other long lived accurate knowledge
  prompt: "Où doivent être stockées les connaissances à long terme du projet ? (docs, recherches, références)"
  default: "docs"
  result: "{project-root}/{value}"