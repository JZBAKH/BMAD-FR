code: core
name: "BMad Core Module"
description: "Utilitaires partagés entre les modules"

header: "Configuration de base BMad"
subheader: "Configurer les paramètres de base de votre installation BMad.\nCes paramètres seront utilisés dans l'ensemble des skills, workflows et agents bmad installés."

user_name:
  prompt: "Comment les agents doivent-ils vous appeler ? (Utilisez votre nom ou un nom d'équipe)"
  scope: user
  default: "BMad"
  result: "{value}"

project_name:
  prompt: "Quel est le nom de votre projet ?"
  default: "{directory_name}"
  result: "{value}"

communication_language:
  prompt: "Quelle langue les agents doivent-ils utiliser pour discuter avec vous ?"
  scope: user
  default: "English"
  result: "{value}"

document_output_language:
  prompt: "Langue préférée pour les documents générés ?"
  default: "English"
  result: "{value}"

output_folder:
  prompt: "Où les fichiers de sortie doivent-ils être enregistrés ?"
  default: "_bmad-output"
  result: "{project-root}/{value}"
