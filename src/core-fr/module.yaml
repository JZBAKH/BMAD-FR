code: core
name: "Module Principal BMad"

header: "Configuration Principale de BMad"
subheader: "Configurez les paramètres de base pour votre installation BMad. Ces paramètres seront utilisés à travers tous les skills, workflows et agents bmad installés."

user_name:
  prompt: "Comment les agents doivent-ils vous appeler ? (Utilisez votre nom ou un titre)"
  default: "Patron"
  result: "{value}"

communication_language:
  prompt: "Quelle langue les agents doivent-ils utiliser pour discuter avec vous ?"
  default: "Français"
  result: "{value}"

document_output_language:
  prompt: "Langue préférée pour la génération de documents ?"
  default: "Français"
  result: "{value}"

output_folder:
  prompt: "Où les fichiers de sortie doivent-ils être sauvegardés ?"
  default: "_bmad-output"
  result: "{project-root}/{value}"
