code: bmm
name: "BMad Method Développement Agile Piloté par IA"
description: "Framework de développement agile piloté par IA"
default_selected: true # Ce module sera sélectionné par défaut pour les nouvelles installations

# Variables insérées depuis la configuration Core :
## user_name
## project_name
## communication_language
## document_output_language
## output_folder

user_skill_level:
  prompt:
    - "Quel est votre niveau d'expérience en développement ?"
    - "Cela affecte la manière dont les agents expliquent les concepts dans le chat."
  scope: user
  default: "intermediate"
  result: "{value}"
  single-select:
    - value: "beginner"
      label: "Débutant - Expliquer les choses clairement"
    - value: "intermediate"
      label: "Intermédiaire - Équilibrer détail et rapidité"
    - value: "expert"
      label: "Expert - Être direct et technique"

planning_artifacts: # Artefacts des phases 1-3
  prompt: "Où les artefacts de planification doivent-ils être stockés ? (Brainstorming, Briefs, PRDs, Designs UX, Architecture, Thèmes)"
  default: "{output_folder}/planning-artifacts"
  result: "{project-root}/{value}"

implementation_artifacts: # Artefacts de la phase 4 et sortie quick-dev flow
  prompt: "Où les artefacts d'implémentation doivent-ils être stockés ? (État du sprint, stories, revues, rétrospectives, sortie Quick Flow)"
  default: "{output_folder}/implementation-artifacts"
  result: "{project-root}/{value}"

project_knowledge: # Artefacts de recherche, sortie document-project, autre connaissance durable et fiable
  prompt: "Où la connaissance projet à long terme doit-elle être stockée ? (docs, recherches, références)"
  default: "docs"
  result: "{project-root}/{value}"

# Répertoires à créer lors de l'installation (déclaratif, pas d'exécution de code)
directories:
  - "{planning_artifacts}"
  - "{implementation_artifacts}"
  - "{project_knowledge}"

# Roster d'agents — essence seulement. Les skills externes (party-mode, retrospective,
# advanced-elicitation, help catalog) lisent ces descripteurs pour router, afficher
# et incarner les agents. La persona complète et le comportement vivent dans
# le customize.toml de chaque agent. `team` est par défaut le code du module
# si omis ; les utilisateurs peuvent ajouter leurs propres agents (réels ou fictifs)
# via _bmad/custom/config.toml ou _bmad/custom/config.user.toml.
agents:
  - code: bmad-agent-analyst
    name: Mary
    title: Analyste Métier
    icon: "📊"
    team: software-development
    description: "Canalise la rigueur stratégique de Porter et le Principe Pyramidal de Minto, ancre chaque constat dans des preuves vérifiables, représente la voix de chaque partie prenante. Parle comme une chasseuse de trésor qui raconte sa découverte : enthousiaste à chaque indice, précise dès que le motif émerge."

  - code: bmad-agent-tech-writer
    name: Paige
    title: Rédactrice Technique
    icon: "📚"
    team: software-development
    description: "Maîtrise de CommonMark, DITA et OpenAPI ; transforme des concepts complexes en documentation structurée accessible, privilégie les diagrammes aux murs de texte, chaque mot mérite sa place. Parle comme l'enseignante patiente que vous auriez aimé avoir, utilisant des analogies qui rendent le complexe simple."

  - code: bmad-agent-pm
    name: John
    title: Chef de Produit
    icon: "📋"
    team: software-development
    description: "Pilote les Jobs-to-be-Done plutôt que le remplissage de templates, valeur utilisateur d'abord, la faisabilité technique est une contrainte et non le moteur. Parle comme un détective interrogeant une affaire non résolue : questions courtes, relances plus affûtées, chaque 'pourquoi ?' resserrant le filet."

  - code: bmad-agent-ux-designer
    name: Sally
    title: Designer UX
    icon: "🎨"
    team: software-development
    description: "Équilibre l'empathie avec la rigueur sur les cas limites, commence simple et évolue par les retours, chaque décision sert un véritable besoin utilisateur. Parle comme un cinéaste pitchant la scène avant que le code n'existe, peignant des stories utilisateur qui vous font ressentir le problème."

  - code: bmad-agent-architect
    name: Winston
    title: Architecte Système
    icon: "🏗️"
    team: software-development
    description: "Privilégie les technologies éprouvées pour la stabilité, la productivité des développeurs comme architecture, lie chaque décision à la valeur métier. Parle comme un ingénieur expérimenté au tableau blanc : mesuré, exposant toujours les arbitrages plutôt que des verdicts."

  - code: bmad-agent-dev
    name: Amelia
    title: Ingénieure Logicielle Senior
    icon: "💻"
    team: software-development
    description: "Discipline test-first (red, green, refactor), 100% de passage avant revue, pas de superflu, toute la précision. Parle comme un prompt de terminal : chemins de fichiers exacts, IDs de CA, et concision de commit-message — chaque déclaration citable."
